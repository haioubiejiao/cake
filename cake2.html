<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Red Cake 甜品电商首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: linear-gradient(90deg, #ffd6e0, #ffc8d8);
            display: flex;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
            gap: 40px;
        }
        /* 左侧标题区域 */
        .left-title {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 60px;
        }
        .dot-text {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 32px;
            color: #ff4477;
            font-weight: bold;
        }
        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff4477;
        }
        .main-title {
            font-size: 90px;
            font-weight: 900;
            color: #ff4477;
            line-height: 1.2;
            text-shadow: 2px 2px 0 #fff;
        }
        .tag-btn {
            background: #ff4477;
            color: #fff;
            border: none;
            font-size: 28px;
            padding: 16px 50px;
            border-radius: 999px;
            font-weight: bold;
        }
        /* 中间PC主页面 */
        .pc-main {
            width: 680px;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(255,80,130,0.15);
        }
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
        }
        .logo-icon {
            width: 24px;
            height: 24px;
            background: #ff4477;
            border-radius: 4px;
        }
        .nav-list a {
            margin: 0 10px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }
        .page-big-title {
            font-size: 52px;
            color: #ff4477;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cake-banner {
            width: 260px;
            height: 220px;
            border-radius: 12px;
            overflow: hidden;
        }
        .cake-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .sub-desc {
            margin: 10px 0 20px;
            color: #666;
        }
        .price-tag {
            font-size: 20px;
            color: #ff4477;
            font-weight: bold;
        }
        .small-tab {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .tab-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #ff4477;
        }
        .three-card-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 30px 0;
        }
        .goods-card {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }
        .card-img {
            height: 140px;
            overflow: hidden;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-info {
            padding: 8px;
        }
        .card-price {
            color: #ff4477;
            font-weight: bold;
        }
        .card-add {
            float: right;
            width: 22px;
            height: 22px;
            background: #ff4477;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            line-height: 22px;
        }
        .goods-block {
            margin: 40px 0;
        }
        .block-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .block-title i {
            width: 20px;
            height: 20px;
            background: #ff4477;
            border-radius: 50%;
            display: inline-block;
        }
        .goods-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .goods-text {
            width: 60%;
        }
        .goods-pic {
            width: 160px;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
        }
        .goods-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 右侧侧边模块 */
        .side-module {
            width: 320px;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(255,80,130,0.15);
        }
        .top-three-box {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 30px;
        }
        .mini-box {
            border: 1px solid #eee;
            border-radius: 6px;
            text-align: center;
            padding: 6px;
        }
        .mini-img {
            height: 80px;
            border-radius: 4px;
            overflow: hidden;
        }
        .mini-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin: 20px 0 12px;
        }
        .side-goods-item {
            display: flex;
            gap: 10px;
            margin: 16px 0;
        }
        .side-goods-img {
            width: 100px;
            height: 90px;
            border-radius: 6px;
            overflow: hidden;
        }
        .side-goods-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .banner-text-box {
            background: #ffe8ef;
            padding: 20px;
            border-radius: 8px;
            margin: 30px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .banner-text-box::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://img1.baidu.com/it/u=1280229011,3028111323&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=400');
